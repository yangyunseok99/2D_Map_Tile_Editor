<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D 맵 타일 에디터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 커스텀 스크롤바 등 필요시 추가 가능 */
    .grid-cell { box-sizing: border-box; }
    .grid-cell.show-grid { border: 1px solid #e5e7eb; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 p-6 font-sans text-gray-800 flex flex-col items-center select-none">

  <div class="max-w-6xl w-full bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden flex flex-col">
    
    <!-- 헤더 -->
    <header class="bg-slate-800 text-white p-4 flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold flex items-center gap-2">
          <i data-lucide="settings" class="w-5 h-5"></i>
          <span data-i18n="title">2D 맵 타일 에디터</span>
          <button id="btn-help" class="ml-3 px-2 py-1 bg-blue-500 hover:bg-blue-600 text-white rounded-full transition-colors flex items-center gap-1 text-xs font-medium shadow" title="사용 설명서 보기">
            <i data-lucide="help-circle" class="w-3.5 h-3.5"></i> <span data-i18n="help">도움말</span>
          </button>
          <button id="btn-lang" class="ml-2 px-2 py-1 bg-slate-700 hover:bg-slate-600 text-white rounded-full transition-colors flex items-center gap-1 text-xs font-medium border border-slate-600 shadow" title="Switch to English">
            🇺🇸 EN
          </button>
        </h1>
        <p class="text-slate-400 text-sm mt-1" data-i18n="subtitle">드래그 앤 드롭으로 맵을 그리고 실시간으로 데이터를 추출하세요.</p>
      </div>
      
      <div class="flex gap-4 items-center">
        <!-- 상단 툴바 -->
        <div class="flex gap-1 items-center bg-slate-700 p-1.5 rounded-lg shadow-inner">
          <button id="tool-pencil" class="tool-btn bg-blue-500 text-white p-1.5 rounded transition-colors" title="연필 (드래그 페인팅)">
            <i data-lucide="pencil" class="w-4 h-4"></i>
          </button>
          <button id="tool-fill" class="tool-btn text-gray-300 hover:bg-slate-600 p-1.5 rounded transition-colors" title="페인트 통 (영역 채우기)">
            <i data-lucide="paint-bucket" class="w-4 h-4"></i>
          </button>
          <div class="w-px h-5 bg-slate-500 mx-1"></div>
          <button id="btn-undo" class="p-1.5 rounded transition-colors flex items-center gap-1 text-gray-500 cursor-not-allowed" title="실행 취소 (Undo)">
            <i data-lucide="undo" class="w-4 h-4"></i>
            <span id="undo-count" class="text-[10px] font-bold">0</span>
          </button>
        </div>

        <div class="flex gap-4 items-center bg-slate-700 p-2 rounded-lg">
          <div class="flex items-center gap-2">
            <label class="text-sm" data-i18n="cols">가로 (Cols):</label>
            <input type="number" id="input-cols" value="15" class="w-16 px-2 py-1 bg-slate-800 border border-slate-600 rounded text-center text-sm text-white focus:outline-none" />
          </div>
          <div class="flex items-center gap-2">
            <label class="text-sm" data-i18n="rows">세로 (Rows):</label>
            <input type="number" id="input-rows" value="10" class="w-16 px-2 py-1 bg-slate-800 border border-slate-600 rounded text-center text-sm text-white focus:outline-none" />
          </div>
          <button id="btn-clear" class="ml-2 px-3 py-1 bg-red-500 hover:bg-red-600 transition-colors rounded text-sm font-medium text-white" data-i18n="clear">
            맵 초기화
          </button>
        </div>
      </div>
    </header>

    <!-- 메인 콘텐츠 영역 -->
    <div class="flex flex-col lg:flex-row flex-1 p-6 gap-6">
      
      <!-- 좌측: 팔레트 관리 -->
      <div class="w-full lg:w-72 flex flex-col gap-4">
        <div class="bg-gray-50 border border-gray-200 rounded-lg p-4">
          <div class="flex justify-between items-center mb-3">
            <h2 class="font-semibold flex items-center gap-2">
              <i data-lucide="mouse-pointer-2" class="w-4 h-4 text-blue-500"></i> <span data-i18n="brushTitle">브러시 선택</span>
            </h2>
            <div class="flex gap-1">
              <button id="btn-copy-pal" class="p-1.5 bg-gray-200 hover:bg-gray-300 rounded text-gray-700 transition-colors">
                <i data-lucide="copy" class="w-3.5 h-3.5"></i>
              </button>
              <button id="btn-paste-pal" class="p-1.5 bg-gray-200 hover:bg-gray-300 rounded text-gray-700 transition-colors">
                <i data-lucide="clipboard-paste" class="w-3.5 h-3.5"></i>
              </button>
            </div>
          </div>
          <div id="palette-list" class="flex flex-col gap-2">
            <!-- 팔레트 항목이 동적으로 추가됩니다 -->
          </div>
        </div>

        <!-- 새 타일 추가 -->
        <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mt-auto">
          <h3 class="font-semibold text-sm mb-3 text-gray-700" data-i18n="addTileTitle">새로운 타일(팔레트) 추가</h3>
          <div class="flex flex-col gap-3">
            <div class="flex items-center gap-2">
              <input type="color" id="new-color" value="#a855f7" class="w-8 h-8 rounded cursor-pointer border border-gray-300 p-0" />
              <input type="text" id="new-name" placeholder="타일 이름" class="flex-1 px-3 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" />
            </div>
            <button id="btn-add-tile" class="w-full flex justify-center items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white py-2 rounded transition-colors text-sm font-medium">
              <i data-lucide="plus" class="w-4 h-4"></i> <span data-i18n="addTileBtn">타일 추가</span>
            </button>
          </div>
        </div>
      </div>

      <!-- 우측: 그리드 캔버스 -->
      <div class="flex-1 flex flex-col items-center justify-center bg-gray-200 border-2 border-dashed border-gray-300 rounded-xl p-4 overflow-auto min-h-[400px]">
        
        <!-- 캔버스 상단 뷰어 옵션 -->
        <div class="flex gap-5 w-full mb-4 justify-end items-center text-sm text-gray-700 font-medium">
          <label class="flex items-center gap-2 cursor-pointer hover:text-blue-600 transition-colors">
            <i data-lucide="grid" class="w-4 h-4"></i>
            <input type="checkbox" id="check-grid" checked class="cursor-pointer" />
            <span data-i18n="gridShow">그리드 선 보기</span>
          </label>
          <div class="w-px h-4 bg-gray-400"></div>
          <label class="flex items-center gap-2">
            <i data-lucide="zoom-in" class="w-4 h-4"></i>
            <span data-i18n="zoom">줌</span>
            <input type="range" id="zoom-slider" min="10" max="60" value="30" class="w-24 cursor-pointer accent-blue-600" />
            <span id="zoom-text" class="w-8 text-right text-gray-500">30px</span>
          </label>
        </div>

        <!-- 맵 그리드 -->
        <div id="map-grid" class="bg-white shadow-lg cursor-crosshair" oncontextmenu="return false;">
          <!-- 셀이 동적으로 추가됩니다 -->
        </div>
        
        <div class="mt-4 text-sm text-gray-500 flex items-center gap-1">
          <i data-lucide="maximize" class="w-4 h-4"></i> 
          <span data-i18n="currSize">현재 크기:</span> <span id="size-text">15 x 10</span> 
          <span data-i18n="dragHelp">(드래그하여 연속 칠하기 가능)</span>
        </div>
      </div>
    </div>

    <!-- 하단: 파일 저장 및 불러오기 영역 -->
    <div class="bg-slate-50 border-t border-gray-200 p-4 flex justify-between items-center">
      <div class="text-sm text-gray-500">
        <span data-i18n="bottomDescPre">* 맵 데이터를 </span><b data-i18n="bottomDescBold">.json 파일</b><span data-i18n="bottomDescPost">로 다운로드하거나 기존 파일을 불러옵니다.</span>
      </div>
      <div class="flex gap-3">
        <input type="file" id="file-input" accept=".json" class="hidden" />
        <button id="btn-import" class="flex items-center gap-2 px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-800 rounded shadow transition-colors font-medium text-sm">
          <i data-lucide="upload" class="w-4 h-4"></i> <span data-i18n="loadJson">파일 불러오기 (.json)</span>
        </button>
        <button id="btn-export" class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded shadow transition-colors font-medium text-sm">
          <i data-lucide="download" class="w-4 h-4"></i> <span data-i18n="saveJson">JSON 파일로 저장</span>
        </button>
        <button id="btn-capture" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded shadow transition-colors font-medium text-sm">
          <i data-lucide="image" class="w-4 h-4"></i> <span data-i18n="captureImg">이미지로 캡처</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 사용 설명서 팝업 (모달) -->
  <div id="guide-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col overflow-hidden animate-in fade-in duration-200">
      <div class="flex justify-between items-center p-5 border-b border-gray-200 bg-slate-50">
        <h2 class="text-xl font-bold flex items-center gap-2 text-slate-800">
          <i data-lucide="help-circle" class="w-6 h-6 text-blue-500"></i> 
          <span data-i18n="guideTitle">🎮 2D 맵 레벨 에디터 초간단 사용 가이드</span>
        </h2>
        <button id="btn-close-modal" class="p-2 hover:bg-slate-200 rounded-full text-slate-500 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div id="guide-content" class="p-6 overflow-y-auto text-slate-700 text-sm leading-relaxed space-y-6">
        <!-- JS에서 다국어 처리로 주입됨 -->
      </div>
    </div>
  </div>

  <script>
    // --- 다국어 데이터 ---
    const locales = {
      ko: {
        title: "2D 맵 타일 에디터", subtitle: "드래그 앤 드롭으로 맵을 그리고 실시간으로 데이터를 추출하세요.", help: "도움말", helpTooltip: "사용 설명서 보기",
        cols: "가로 (Cols):", rows: "세로 (Rows):", clear: "맵 초기화", brushTitle: "브러시 선택", addTileTitle: "새로운 타일(팔레트) 추가",
        tileNamePh: "타일 이름", addTileBtn: "타일 추가", gridShow: "그리드 선 보기", zoom: "줌", currSize: "현재 크기:", dragHelp: "(드래그하여 연속 칠하기 가능)",
        bottomDescPre: "* 맵 데이터를 ", bottomDescBold: ".json 파일", bottomDescPost: "로 다운로드하거나 기존 파일을 불러옵니다.",
        loadJson: "파일 불러오기 (.json)", saveJson: "JSON 파일로 저장", captureImg: "이미지로 캡처", copyPalTitle: "팔레트 백업(클립보드 복사)",
        pastePalTitle: "백업된 팔레트 불러오기", delTitle: "삭제", pencilTitle: "연필 (드래그 페인팅)", fillTitle: "페인트 통 (영역 채우기)", undoTitle: "실행 취소 (Undo)",
        errFormat: "올바른 2차원 배열 형식이 아닙니다.", errLength: "모든 행(Row)의 길이가 같아야 합니다.", errFile: "파일 불러오기 오류: ", alert0: "0번(빈칸) 타일은 삭제할 수 없습니다.",
        alertCopy: "팔레트 데이터가 복사되었습니다. 메모장 등에 백업해두세요!", promptPaste: "저장해둔 팔레트 JSON 데이터를 붙여넣어주세요.", errPaste: "오류: 올바른 팔레트 JSON 형식이 아닙니다.",
        guideTitle: "🎮 2D 맵 레벨 에디터 초간단 사용 가이드", close: "닫기", legendTitle: "🎨 타일 범례 (Palette)",
        palette_0: "빈칸 (지우개)", palette_1: "벽", palette_2: "플레이어 시작점", palette_3: "몬스터", palette_4: "수풀/장애물",
        guideHtml: `
          <p class="text-base text-slate-600">게임 기획자나 개발자를 꿈꾸시나요? 이 툴은 복잡한 코딩 없이, 그림판에서 그림을 그리듯 슥슥 마우스로 드래그해서 게임 맵(지도) 데이터를 만들어주는 마법 같은 도구입니다.</p>
          <section><h3 class="text-lg font-bold text-slate-900 mb-2 border-b border-slate-200 pb-1">🎨 1. 맵 그리기 (가장 기본!)</h3><p>화면 왼쪽의 <strong>[브러시 선택]</strong>에서 원하는 타일(예: 벽, 몬스터, 수풀)을 클릭하세요. 그다음 오른쪽 넓은 격자(그리드) 화면에 마우스를 대고 <strong>클릭한 채로 쭉~ 드래그</strong>해 보세요. 엑셀 칸을 채우는 것처럼 연속해서 색이 칠해집니다!</p><ul class="list-disc list-inside mt-2 text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-100"><li><strong>지우개 꿀팁:</strong> 팔레트에서 지우개를 누르지 않아도, <strong>마우스 우클릭</strong>으로 칠하면 바로 지우개 모드가 됩니다!</li></ul></section>
          <section><h3 class="text-lg font-bold text-slate-900 mb-2 border-b border-slate-200 pb-1">🛠️ 2. 짱 편한 마법의 도구들 (상단 툴바)</h3><p>화면 위쪽 가운데를 보면 도구 버튼 3개가 있어요.</p><ul class="space-y-3 mt-3 ml-2"><li class="flex gap-3 items-start"><span class="text-xl leading-none">✏️</span> <span><strong>연필:</strong> 마우스로 드래그해서 내가 원하는 곳만 칠할 때 써요.</span></li><li class="flex gap-3 items-start"><span class="text-xl leading-none">🪣</span> <span><strong>페인트 통:</strong> 텅 빈 방이나 넓은 바다를 한 번에 같은 색으로 채우고 싶을 때 클릭하세요. (노가다 해방!)</span></li><li class="flex gap-3 items-start"><span class="text-xl leading-none">↩️</span> <span><strong>실행 취소 (Undo):</strong> 앗 실수! 이럴 땐 버튼을 누르거나 키보드 <strong>Ctrl + Z</strong>를 누르세요. 최대 20번까지 되돌릴 수 있습니다.</span></li></ul></section>
          <section><h3 class="text-lg font-bold text-slate-900 mb-2 border-b border-slate-200 pb-1">➕ 3. 나만의 타일(블록) 만들기</h3><p>기본으로 제공되는 벽, 몬스터 말고 '용암', '보물상자' 같은 타일이 필요하다고요? 왼쪽 아래 <strong>[새로운 타일 추가]</strong>에서 나만의 타일을 만들어보세요.</p><ol class="list-decimal list-inside mt-2 space-y-1 ml-2 font-medium"><li>색상 네모 칸을 눌러서 원하는 색을 고릅니다.</li><li>'타일 이름' 칸에 "보물상자"라고 이름을 적습니다.</li><li><strong>[+ 타일 추가]</strong> 버튼을 누르면 위쪽 팔레트에 짠! 하고 생깁니다.</li></ol><div class="mt-4 bg-amber-50 border border-amber-200 p-4 rounded-lg flex gap-3 items-start shadow-sm"><span class="text-amber-500 text-lg">💡</span><div class="text-amber-900 text-sm"><strong class="block mb-1 text-amber-800">팔레트 백업 꿀팁:</strong> 나중에 이 사이트를 다시 열었을 때 내가 만든 타일 목록이 날아가면 슬프겠죠? 브러시 선택 옆에 있는 <code class="bg-amber-100 px-1 rounded">복사</code> 버튼을 누르면 타일 정보가 복사됩니다. 메모장에 붙여넣기로 저장해두고, 나중에 <code class="bg-amber-100 px-1 rounded">불러오기</code> 버튼을 눌러서 복구하세요!</div></div></section>
          <section><h3 class="text-lg font-bold text-slate-900 mb-2 border-b border-slate-200 pb-1">📏 4. 맵 크기와 화면 조절하기</h3><ul class="list-disc list-inside mt-2 space-y-2 ml-2"><li><strong>맵 넓히기:</strong> 화면 맨 위 오른쪽에서 <strong>가로(Cols)</strong>와 <strong>세로(Rows)</strong> 숫자를 바꿔보세요.</li><li><strong>맵 한눈에 보기:</strong> 맵 화면 바로 위에 있는 <strong>[줌]</strong> 슬라이더를 밀어보세요.</li><li><strong>선 없애기:</strong> 타일들이 어떻게 이어져 있는지 보고 싶다면 <strong>[그리드 선 보기]</strong> 체크를 해제해 보세요.</li><li><strong>싹 지우기:</strong> 빨간색 <strong>[맵 초기화]</strong> 버튼을 누르세요.</li></ul></section>
          <section><h3 class="text-lg font-bold text-slate-900 mb-2 border-b border-slate-200 pb-1">💾 5. 저장하고 불러오기 (진짜 중요!)</h3><ul class="space-y-3 mt-3 ml-2 bg-slate-50 p-4 rounded-lg border border-slate-100"><li class="flex gap-3"><span class="text-lg">📥</span> <span><strong>[JSON 파일로 저장]:</strong> 완성된 맵을 데이터로 다운로드합니다.</span></li><li class="flex gap-3"><span class="text-lg">📤</span> <span><strong>[파일 불러오기 (.json)]:</strong> 저장해둔 맵 파일을 다시 엽니다.</span></li><li class="flex gap-3"><span class="text-lg">🖼️</span> <span><strong>[이미지로 캡처]:</strong> 기획서 첨부용 <code>.png</code> 사진 파일로 저장합니다.</span></li></ul></section>
          <div class="text-center bg-blue-50 text-blue-800 p-4 rounded-xl mt-6 font-bold text-base shadow-sm">자, 이제 직접 클릭하고 드래그하면서 나만의 멋진 맵을 만들어보세요! 🎉</div>
        `
      },
      en: {
        title: "2D Map Tile Editor", subtitle: "Draw maps with drag-and-drop and extract data in real-time.", help: "Help", helpTooltip: "View user guide",
        cols: "Cols:", rows: "Rows:", clear: "Clear Map", brushTitle: "Select Brush", addTileTitle: "Add New Tile (Palette)",
        tileNamePh: "Tile Name", addTileBtn: "Add Tile", gridShow: "Show Grid", zoom: "Zoom", currSize: "Current Size:", dragHelp: "(Drag to paint continuously)",
        bottomDescPre: "* Download map data as a ", bottomDescBold: ".json file", bottomDescPost: " or load an existing file.",
        loadJson: "Import (.json)", saveJson: "Export JSON", captureImg: "Capture Image", copyPalTitle: "Backup Palette (Copy to Clipboard)",
        pastePalTitle: "Restore Backup Palette", delTitle: "Delete", pencilTitle: "Pencil (Drag to paint)", fillTitle: "Paint Bucket (Fill area)", undoTitle: "Undo",
        errFormat: "Invalid 2D array format.", errLength: "All rows must have the same length.", errFile: "File import error: ", alert0: "Tile ID 0 (Empty) cannot be deleted.",
        alertCopy: "Palette data copied! Please paste it into a notepad to backup.", promptPaste: "Please paste your saved palette JSON data.", errPaste: "Error: Invalid palette JSON format.",
        guideTitle: "🎮 2D Map Level Editor Quick Guide", close: "Close", legendTitle: "🎨 Palette Legend",
        palette_0: "Empty (Eraser)", palette_1: "Wall", palette_2: "Player Spawn", palette_3: "Monster", palette_4: "Bush/Obstacle",
        guideHtml: `
          <p class="text-base text-slate-600">Dreaming of becoming a game designer or developer? This tool lets you create game map data by simply dragging your mouse, just like drawing in a paint tool, without any complex coding.</p>
          <section><h3 class="text-lg font-bold text-slate-900 mb-2 border-b border-slate-200 pb-1">🎨 1. Drawing the Map (The Basics!)</h3><p>Click on the desired tile from the <strong>[Select Brush]</strong> panel. Then, <strong>click and drag</strong> on the grid screen. Colors will be painted continuously!</p><ul class="list-disc list-inside mt-2 text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-100"><li><strong>Eraser Tip:</strong> <strong>Right-Click and drag</strong> to enter eraser mode instantly!</li></ul></section>
          <section><h3 class="text-lg font-bold text-slate-900 mb-2 border-b border-slate-200 pb-1">🛠️ 2. Handy Magic Tools</h3><ul class="space-y-3 mt-3 ml-2"><li class="flex gap-3 items-start"><span class="text-xl leading-none">✏️</span> <span><strong>Pencil:</strong> Drag to paint.</span></li><li class="flex gap-3 items-start"><span class="text-xl leading-none">🪣</span> <span><strong>Paint Bucket:</strong> Click to fill an area.</span></li><li class="flex gap-3 items-start"><span class="text-xl leading-none">↩️</span> <span><strong>Undo:</strong> Click this or press <strong>Ctrl + Z</strong>. (Max 20 history)</span></li></ul></section>
          <section><h3 class="text-lg font-bold text-slate-900 mb-2 border-b border-slate-200 pb-1">➕ 3. Creating Custom Tiles</h3><p>Need custom tiles like 'Lava'? Create them in the <strong>[Add New Tile]</strong> section.</p><ol class="list-decimal list-inside mt-2 space-y-1 ml-2 font-medium"><li>Pick a color.</li><li>Type a name.</li><li>Click <strong>[Add Tile]</strong>!</li></ol><div class="mt-4 bg-amber-50 border border-amber-200 p-4 rounded-lg flex gap-3 items-start shadow-sm"><span class="text-amber-500 text-lg">💡</span><div class="text-amber-900 text-sm"><strong class="block mb-1 text-amber-800">Palette Backup Tip:</strong> Click the <code class="bg-amber-100 px-1 rounded">Copy</code> icon to backup your custom palette to clipboard!</div></div></section>
          <section><h3 class="text-lg font-bold text-slate-900 mb-2 border-b border-slate-200 pb-1">📏 4. Adjusting Map Size & View</h3><ul class="list-disc list-inside mt-2 space-y-2 ml-2"><li><strong>Expand:</strong> Change <strong>Cols</strong> and <strong>Rows</strong> numbers.</li><li><strong>Zoom:</strong> Move the <strong>[Zoom]</strong> slider left or right.</li><li><strong>Hide Lines:</strong> Uncheck <strong>[Show Grid]</strong>.</li><li><strong>Clear:</strong> Click the red <strong>[Clear Map]</strong> button.</li></ul></section>
          <section><h3 class="text-lg font-bold text-slate-900 mb-2 border-b border-slate-200 pb-1">💾 5. Save and Load (Crucial!)</h3><ul class="space-y-3 mt-3 ml-2 bg-slate-50 p-4 rounded-lg border border-slate-100"><li class="flex gap-3"><span class="text-lg">📥</span> <span><strong>[Export JSON]:</strong> Download your map data.</span></li><li class="flex gap-3"><span class="text-lg">📤</span> <span><strong>[Import (.json)]:</strong> Load previously saved data.</span></li><li class="flex gap-3"><span class="text-lg">🖼️</span> <span><strong>[Capture Image]:</strong> Save map as a clean <code>.png</code>.</span></li></ul></section>
        `
      }
    };

    // --- 상태 관리 ---
    let state = {
      lang: 'ko',
      rows: 10,
      cols: 15,
      mapData: Array(10).fill(0).map(() => Array(15).fill(0)),
      palette: [
        { id: 0, color: '#ffffff', name: '빈칸 (지우개)' },
        { id: 1, color: '#334155', name: '벽' },
        { id: 2, color: '#3b82f6', name: '플레이어 시작점' },
        { id: 3, color: '#ef4444', name: '몬스터' },
        { id: 4, color: '#22c55e', name: '수풀/장애물' },
      ],
      activeBrush: 1,
      isPainting: false,
      tool: 'pencil', // 'pencil' | 'fill'
      history: [],
      showGrid: true,
      cellSize: 30,
    };

    // --- DOM Elements ---
    const els = {
      grid: document.getElementById('map-grid'),
      paletteList: document.getElementById('palette-list'),
      zoomSlider: document.getElementById('zoom-slider'),
      zoomText: document.getElementById('zoom-text'),
      sizeText: document.getElementById('size-text'),
      checkGrid: document.getElementById('check-grid'),
      inputCols: document.getElementById('input-cols'),
      inputRows: document.getElementById('input-rows'),
      btnUndo: document.getElementById('btn-undo'),
      undoCount: document.getElementById('undo-count'),
      toolPencil: document.getElementById('tool-pencil'),
      toolFill: document.getElementById('tool-fill'),
      newColor: document.getElementById('new-color'),
      newName: document.getElementById('new-name'),
      guideModal: document.getElementById('guide-modal'),
      guideContent: document.getElementById('guide-content'),
      fileInput: document.getElementById('file-input'),
      btnLang: document.getElementById('btn-lang')
    };

    // --- 초기화 및 렌더링 함수 ---
    function init() {
      lucide.createIcons();
      applyI18n();
      renderPalette();
      renderGrid();
      updateToolbar();
      setupEventListeners();
    }

    function applyI18n() {
      const texts = locales[state.lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (texts[key]) el.innerHTML = texts[key];
      });
      els.newName.placeholder = texts.tileNamePh;
      els.inputCols.value = state.cols;
      els.inputRows.value = state.rows;
      els.sizeText.textContent = `${state.cols} x ${state.rows}`;
      els.guideContent.innerHTML = texts.guideHtml;
      
      els.btnLang.innerHTML = state.lang === 'ko' ? '🇺🇸 EN' : '🇰🇷 KO';
      els.btnLang.title = state.lang === 'ko' ? 'Switch to English' : '한국어로 변경';

      // 툴바 툴팁 업데이트
      els.toolPencil.title = texts.pencilTitle;
      els.toolFill.title = texts.fillTitle;
      els.btnUndo.title = texts.undoTitle;
      document.getElementById('btn-copy-pal').title = texts.copyPalTitle;
      document.getElementById('btn-paste-pal').title = texts.pastePalTitle;

      renderPalette(); // 팔레트 이름 언어 변경 반영
    }

    function getPaletteName(id, originalName) {
      const key = `palette_${id}`;
      if (id <= 4 && originalName === locales.ko[key]) {
        return locales[state.lang][key];
      }
      return originalName;
    }

    function getCellColor(val) {
      const item = state.palette.find(p => p.id === val);
      return item ? item.color : '#f87171';
    }

    function renderPalette() {
      els.paletteList.innerHTML = '';
      state.palette.forEach(item => {
        const isActive = state.activeBrush === item.id;
        const div = document.createElement('div');
        div.className = `flex items-center justify-between p-2 rounded cursor-pointer border-2 transition-all ${isActive ? 'border-blue-500 bg-blue-50' : 'border-transparent hover:bg-gray-100'}`;
        div.onclick = () => { state.activeBrush = item.id; renderPalette(); };

        const nameText = getPaletteName(item.id, item.name);
        
        let deleteBtnHtml = '';
        if (item.id !== 0) {
          deleteBtnHtml = `<button class="btn-del text-gray-400 hover:text-red-500 p-1" title="${locales[state.lang].delTitle}"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
        }

        div.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="w-6 h-6 rounded shadow-sm border border-gray-300" style="background-color: ${item.color}"></div>
            <span class="font-medium text-sm">${item.id}. ${nameText}</span>
          </div>
          ${deleteBtnHtml}
        `;

        if (item.id !== 0) {
          div.querySelector('.btn-del').onclick = (e) => {
            e.stopPropagation();
            if (state.activeBrush === item.id) state.activeBrush = 0;
            state.palette = state.palette.filter(p => p.id !== item.id);
            renderPalette();
          };
        }

        els.paletteList.appendChild(div);
      });
      lucide.createIcons();
    }

    function renderGrid() {
      els.grid.style.display = 'grid';
      els.grid.style.gridTemplateColumns = `repeat(${state.cols}, ${state.cellSize}px)`;
      els.grid.style.gridTemplateRows = `repeat(${state.rows}, ${state.cellSize}px)`;
      els.grid.className = `select-none bg-white shadow-lg ${state.tool === 'fill' ? 'cursor-pointer' : 'cursor-crosshair'}`;
      els.grid.innerHTML = '';

      const fragment = document.createDocumentFragment();

      for (let r = 0; r < state.rows; r++) {
        for (let c = 0; c < state.cols; c++) {
          const cellVal = state.mapData[r][c];
          const div = document.createElement('div');
          div.className = `grid-cell hover:brightness-95 transition-all duration-75 ease-in-out ${state.showGrid ? 'show-grid' : ''}`;
          div.style.backgroundColor = getCellColor(cellVal);
          div.title = `(${r}, ${c}) - ID: ${cellVal}`;
          div.dataset.r = r;
          div.dataset.c = c;

          // Event Listeners for Painting
          div.onmousedown = (e) => {
            e.preventDefault();
            handleMouseDown(e, r, c);
          };
          div.onmouseenter = (e) => handleMouseEnter(e, r, c);

          fragment.appendChild(div);
        }
      }
      els.grid.appendChild(fragment);
      
      els.zoomText.textContent = `${state.cellSize}px`;
      els.sizeText.textContent = `${state.cols} x ${state.rows}`;
    }

    function updateSingleCell(r, c) {
      const index = r * state.cols + c;
      const cell = els.grid.children[index];
      if (cell) {
        const val = state.mapData[r][c];
        cell.style.backgroundColor = getCellColor(val);
        cell.title = `(${r}, ${c}) - ID: ${val}`;
      }
    }

    function updateToolbar() {
      els.toolPencil.className = `tool-btn p-1.5 rounded transition-colors ${state.tool === 'pencil' ? 'bg-blue-500 text-white' : 'text-gray-300 hover:bg-slate-600'}`;
      els.toolFill.className = `tool-btn p-1.5 rounded transition-colors ${state.tool === 'fill' ? 'bg-blue-500 text-white' : 'text-gray-300 hover:bg-slate-600'}`;
      els.grid.className = `select-none bg-white shadow-lg ${state.tool === 'fill' ? 'cursor-pointer' : 'cursor-crosshair'}`;
      
      const historyLen = state.history.length;
      els.undoCount.textContent = historyLen;
      els.btnUndo.className = `p-1.5 rounded transition-colors flex items-center gap-1 ${historyLen === 0 ? 'text-gray-500 cursor-not-allowed' : 'text-gray-300 hover:bg-slate-600'}`;
    }

    function updateGridLines() {
      const cells = document.querySelectorAll('.grid-cell');
      cells.forEach(cell => {
        if (state.showGrid) cell.classList.add('show-grid');
        else cell.classList.remove('show-grid');
      });
    }

    // --- 기획자 핵심 로직 (Painting & Tools) ---
    function saveHistory() {
      state.history.push(JSON.parse(JSON.stringify(state.mapData)));
      if (state.history.length > 20) state.history.shift(); // Max 20
      updateToolbar();
    }

    function handleUndo() {
      if (state.history.length === 0) return;
      state.mapData = state.history.pop();
      renderGrid();
      updateToolbar();
    }

    function paintCell(r, c, brushId) {
      if (state.mapData[r][c] === brushId) return;
      state.mapData[r][c] = brushId;
      updateSingleCell(r, c);
    }

    function floodFill(startR, startC, targetId, replacementId) {
      if (targetId === replacementId) return;
      const queue = [[startR, startC]];
      
      while (queue.length > 0) {
        const [r, c] = queue.shift();
        if (r < 0 || r >= state.rows || c < 0 || c >= state.cols) continue;
        if (state.mapData[r][c] !== targetId) continue;
        
        state.mapData[r][c] = replacementId;
        updateSingleCell(r, c);
        queue.push([r + 1, c], [r - 1, c], [r, c + 1], [r, c - 1]);
      }
    }

    function handleMouseDown(e, r, c) {
      saveHistory();
      const isRightClick = e.button === 2;
      const targetBrush = isRightClick ? 0 : state.activeBrush;

      if (state.tool === 'fill' && !isRightClick) {
        floodFill(r, c, state.mapData[r][c], targetBrush);
      } else {
        state.isPainting = true;
        paintCell(r, c, targetBrush);
      }
    }

    function handleMouseEnter(e, r, c) {
      if (state.isPainting && state.tool === 'pencil') {
        const targetBrush = e.buttons === 2 || e.button === 2 ? 0 : state.activeBrush;
        paintCell(r, c, targetBrush);
      }
    }

    function handleResize(newRows, newCols) {
      const validRows = Math.max(1, Math.min(parseInt(newRows) || 1, 50));
      const validCols = Math.max(1, Math.min(parseInt(newCols) || 1, 50));
      
      state.rows = validRows;
      state.cols = validCols;
      
      const newMapData = Array(validRows).fill(0).map((_, r) => 
        Array(validCols).fill(0).map((_, c) => {
          return (state.mapData[r] && state.mapData[r][c] !== undefined) ? state.mapData[r][c] : 0;
        })
      );
      state.mapData = newMapData;
      
      els.inputCols.value = validCols;
      els.inputRows.value = validRows;
      renderGrid();
    }

    // --- Export & Import ---
    function exportJSON() {
      const dataStr = JSON.stringify(state.mapData, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "level_data.json";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(e.target.result);
          if (!Array.isArray(parsed) || parsed.length === 0 || !Array.isArray(parsed[0])) {
            throw new Error(locales[state.lang].errFormat);
          }
          const newR = parsed.length;
          const newC = parsed[0].length;
          if (!parsed.every(row => Array.isArray(row) && row.length === newC)) {
            throw new Error(locales[state.lang].errLength);
          }

          saveHistory();
          state.rows = newR;
          state.cols = newC;
          state.mapData = parsed;
          
          els.inputRows.value = newR;
          els.inputCols.value = newC;
          renderGrid();
          els.fileInput.value = "";
        } catch (error) {
          alert(locales[state.lang].errFile + error.message);
        }
      };
      reader.readAsText(file);
    }

    function exportImage() {
      const canvas = document.createElement('canvas');
      const gridWidth = state.cols * state.cellSize;
      const gridHeight = state.rows * state.cellSize;
      const legendWidth = 220;
      const legendHeight = state.palette.length * 30 + 70;
      
      canvas.width = gridWidth + legendWidth;
      canvas.height = Math.max(gridHeight, legendHeight);
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let r = 0; r < state.rows; r++) {
        for (let c = 0; c < state.cols; c++) {
          ctx.fillStyle = getCellColor(state.mapData[r][c]);
          ctx.fillRect(c * state.cellSize, r * state.cellSize, state.cellSize, state.cellSize);

          if (state.showGrid) {
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            ctx.strokeRect(c * state.cellSize, r * state.cellSize, state.cellSize, state.cellSize);
          }
        }
      }

      const legendX = gridWidth + 20;
      ctx.fillStyle = '#1e293b';
      ctx.font = 'bold 16px sans-serif';
      ctx.fillText(locales[state.lang].legendTitle, legendX, 30);

      state.palette.forEach((item, index) => {
        const y = 55 + (index * 30);
        ctx.fillStyle = item.color;
        ctx.fillRect(legendX, y, 20, 20);
        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 1;
        ctx.strokeRect(legendX, y, 20, 20);
        
        ctx.fillStyle = '#334155';
        ctx.font = '14px sans-serif';
        ctx.fillText(`${item.id}. ${getPaletteName(item.id, item.name)}`, legendX + 30, y + 15);
      });

      const url = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.href = url;
      link.download = 'level_map_screenshot.png';
      link.click();
    }

    // --- 이벤트 리스너 바인딩 ---
    function setupEventListeners() {
      // Global Mouse Up
      window.addEventListener('mouseup', () => state.isPainting = false);
      els.grid.addEventListener('mouseleave', () => state.isPainting = false);

      // Keyboard Shortcut (Ctrl+Z)
      window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
          e.preventDefault();
          handleUndo();
        }
      });

      // Toolbar Toggles
      els.toolPencil.onclick = () => { state.tool = 'pencil'; updateToolbar(); };
      els.toolFill.onclick = () => { state.tool = 'fill'; updateToolbar(); };
      els.btnUndo.onclick = handleUndo;

      // Top Actions
      document.getElementById('btn-clear').onclick = () => {
        saveHistory();
        state.mapData = Array(state.rows).fill(0).map(() => Array(state.cols).fill(0));
        renderGrid();
      };
      
      els.inputCols.onchange = (e) => handleResize(state.rows, e.target.value);
      els.inputRows.onchange = (e) => handleResize(e.target.value, state.cols);

      // Add Tile
      document.getElementById('btn-add-tile').onclick = () => {
        const name = els.newName.value.trim();
        if (!name) return;
        const nextId = Math.max(...state.palette.map(p => p.id), 0) + 1;
        state.palette.push({ id: nextId, color: els.newColor.value, name: name });
        els.newName.value = '';
        renderPalette();
      };

      // Palette Backup
      document.getElementById('btn-copy-pal').onclick = () => {
        const el = document.createElement('textarea');
        el.value = JSON.stringify(state.palette, null, 2);
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert(locales[state.lang].alertCopy);
      };
      document.getElementById('btn-paste-pal').onclick = () => {
        const input = prompt(locales[state.lang].promptPaste);
        if (!input) return;
        try {
          const parsed = JSON.parse(input);
          if (Array.isArray(parsed) && parsed[0].id !== undefined) {
            state.palette = parsed;
            renderPalette();
          } else throw new Error();
        } catch (err) { alert(locales[state.lang].errPaste); }
      };

      // Zoom & Grid Show
      els.zoomSlider.oninput = (e) => {
        state.cellSize = Number(e.target.value);
        renderGrid(); // Size changes require full DOM grid update
      };
      els.checkGrid.onchange = (e) => {
        state.showGrid = e.target.checked;
        updateGridLines();
      };

      // Bottom Actions
      document.getElementById('btn-import').onclick = () => els.fileInput.click();
      els.fileInput.onchange = importJSON;
      document.getElementById('btn-export').onclick = exportJSON;
      document.getElementById('btn-capture').onclick = exportImage;

      // Modals & Language
      document.getElementById('btn-help').onclick = () => { els.guideModal.classList.remove('hidden'); };
      document.getElementById('btn-close-modal').onclick = () => { els.guideModal.classList.add('hidden'); };
      els.guideModal.onclick = (e) => { if(e.target === els.guideModal) els.guideModal.classList.add('hidden'); };
      
      els.btnLang.onclick = () => {
        state.lang = state.lang === 'ko' ? 'en' : 'ko';
        applyI18n();
      };
    }

    // App Start
    window.onload = init;

  </script>
</body>
</html>
